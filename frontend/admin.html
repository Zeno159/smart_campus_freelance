<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Dashboard | Campus Freelance Marketplace</title>
  <meta name="description" content="Platform administration dashboard with earnings, statistics, and database management." />
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>

<!-- Navbar -->
<nav class="navbar">
  <div class="container navbar-inner">
    <a href="/home.html" class="navbar-brand">Campus Marketplace</a>
    <div class="navbar-links">
      <a href="/home.html">Jobs</a>
      <a href="/profile.html">Profile</a>
    </div>
    <div class="navbar-user">
      <span class="navbar-wallet" id="wallet-display">Wallet: --</span>
      <button class="btn btn-ghost btn-sm" onclick="logout()">Sign out</button>
    </div>
  </div>
</nav>

<main class="page">
  <div class="container" style="max-width: 1200px;">
    <div id="alert-box"></div>

    <div class="section-title">🏢 Admin Dashboard</div>
    <p class="text-sm text-muted" style="margin-bottom: 24px;">
      Platform overview, earnings tracking, and database management. <strong>Administrator access only.</strong>
    </p>

    <!-- Stats Overview -->
    <div class="card" style="margin-bottom: 24px;">
      <div class="section-title">Database Statistics</div>
      <div id="stats-content">
        <div class="empty-state">Loading statistics...</div>
      </div>
    </div>

    <!-- Table Browser -->
    <div class="card">
      <div class="section-title">Table Browser</div>
      <div style="margin-bottom: 16px; display: flex; flex-wrap: wrap; gap: 12px; align-items: center;">
        <select id="table-select" class="form-control" style="max-width: 300px; display: inline-block;">
          <option value="">Select a table...</option>
          <option value="users">Users</option>
          <option value="categories">Categories</option>
          <option value="services">Services</option>
          <option value="job_requests">Job Requests</option>
          <option value="applications">Applications</option>
          <option value="contracts">Contracts</option>
          <option value="payments">Payments</option>
          <option value="ratings">Ratings</option>
          <option value="freelancer_stats">Freelancer Stats</option>
          <option value="work_submissions">Work Submissions</option>
          <option value="wallet_transactions">Wallet Transactions</option>
        </select>
        <input id="table-search" type="text" placeholder="Search users by name or email" class="form-control" style="max-width: 360px; display: inline-block;" />
        <button class="btn btn-primary" onclick="loadTableData()">Load Table Data</button>
        <button class="btn btn-secondary" onclick="resetSearch()">Reset Search</button>
      </div>
      <div id="table-content">
        <div class="empty-state">Select a table to view its contents.</div>
      </div>
      <div id="table-pagination" style="margin-top: 16px; display: flex; flex-wrap: wrap; align-items: center; gap: 10px;"></div>
    </div>
  </div>
</main>

<script src="/js/api.js"></script>
<script>
  requireAuth();
  const currentUser = getUser();
  if (!currentUser || !currentUser.is_admin) {
    window.location.href = "/home.html";
  }

  let currentTableName = "";
  let currentSearchValue = "";
  let currentPage = 1;
  const TABLE_PAGE_SIZE = 50;

  function getSearchPlaceholder(tableName) {
    const hints = {
      "users": "Search by name, email, or contact",
      "wallet_transactions": "Search by user id, txn id, or description",
      "contracts": "Search by id, job id, freelancer id, or status",
      "categories": "Search by category name",
      "services": "Search by title or user id",
      "job_requests": "Search by title, id, client id, or status",
      "applications": "Search by id, job id, freelancer id, or status",
      "payments": "Search by id, contract id, or payment status",
      "ratings": "Search by id, contract id, or review text",
      "freelancer_stats": "Search by freelancer id",
      "work_submissions": "Search by id, contract id, file type, or notes"
    };
    return hints[tableName] || "Enter search term or leave blank";
  }

  function updateSearchPlaceholder() {
    const tableSelect = document.getElementById("table-select");
    const searchInput = document.getElementById("table-search");
    const newPlaceholder = getSearchPlaceholder(tableSelect.value);
    searchInput.placeholder = newPlaceholder;
    currentPage = 1;
  }

  document.getElementById("table-select").addEventListener("change", updateSearchPlaceholder);

  async function refreshWallet() {
    try {
      const me = await apiFetch("/auth/me");
      document.getElementById("wallet-display").textContent = `Wallet: Rs.${Number(me.wallet_balance).toFixed(2)}`;
    } catch {}
  }

  async function loadStats() {
    try {
      const stats = await apiFetch("/database/stats");
      renderStats(stats);
    } catch (err) {
      document.getElementById("stats-content").innerHTML =
        `<div class="alert alert-error">${err.message}</div>`;
    }
  }

  function renderStats(stats) {
    let html = `
      <!-- Platform Overview -->
      <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-bottom: 32px;">
        <div class="stat-card stat-card-primary">
          <div class="stat-number">Rs.${stats.total_commission_earnings.toLocaleString()}</div>
          <div class="stat-label">Total Commission Earnings</div>
          <div class="stat-subtext">1% from all completed jobs</div>
        </div>
        <div class="stat-card stat-card-success">
          <div class="stat-number">Rs.${stats.total_platform_revenue.toLocaleString()}</div>
          <div class="stat-label">Total Platform Revenue</div>
          <div class="stat-subtext">All released payments</div>
        </div>
        <div class="stat-card stat-card-info">
          <div class="stat-number">Rs.${stats.total_wallet_balance.toLocaleString()}</div>
          <div class="stat-label">Total User Wallets</div>
          <div class="stat-subtext">Combined user balances</div>
        </div>
      </div>

      <!-- Activity Stats -->
      <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 32px;">
        <div class="stat-card">
          <div class="stat-number">${stats.users}</div>
          <div class="stat-label">Total Users</div>
        </div>
        <div class="stat-card">
          <div class="stat-number">${stats.job_requests}</div>
          <div class="stat-label">Total Jobs</div>
        </div>
        <div class="stat-card">
          <div class="stat-number">${stats.active_contracts}</div>
          <div class="stat-label">Active Contracts</div>
        </div>
        <div class="stat-card">
          <div class="stat-number">${stats.completed_contracts}</div>
          <div class="stat-label">Completed Contracts</div>
        </div>
        <div class="stat-card">
          <div class="stat-number">${stats.applications}</div>
          <div class="stat-label">Total Applications</div>
        </div>
        <div class="stat-card">
          <div class="stat-number">${stats.payments}</div>
          <div class="stat-label">Total Payments</div>
        </div>
      </div>

      <!-- Recent Activity -->
      <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 24px;">
        <div class="stat-card stat-card-warning">
          <div class="stat-number">${stats.recent_jobs_7d}</div>
          <div class="stat-label">Jobs (Last 7 Days)</div>
        </div>
        <div class="stat-card stat-card-warning">
          <div class="stat-number">${stats.recent_contracts_7d}</div>
          <div class="stat-label">Contracts (Last 7 Days)</div>
        </div>
        <div class="stat-card">
          <div class="stat-number">${stats.ratings}</div>
          <div class="stat-label">Total Ratings</div>
        </div>
        <div class="stat-card">
          <div class="stat-number">${stats.wallet_transactions}</div>
          <div class="stat-label">Wallet Transactions</div>
        </div>
      </div>

      <div style="text-align: center; margin-top: 24px; padding: 16px; background: var(--bg-secondary); border-radius: 8px;">
        <p class="text-sm text-muted">
          💡 Use the table browser below to inspect detailed data from any table in the database.
        </p>
      </div>
    `;

    document.getElementById("stats-content").innerHTML = html;
  }

  async function loadTableData(page = 1) {
    const tableName = document.getElementById("table-select").value;
    if (!tableName) return;

    currentTableName = tableName;
    currentSearchValue = document.getElementById("table-search").value.trim();
    currentPage = page;

    let url = `/database/table/${tableName}?limit=${TABLE_PAGE_SIZE}&page=${currentPage}`;
    if (currentSearchValue) {
      url += `&search=${encodeURIComponent(currentSearchValue)}`;
    }

    try {
      const data = await apiFetch(url);
      if (data.error) {
        throw new Error(data.error);
      }
      renderTable(data, tableName);
      renderPagination(data);
    } catch (err) {
      document.getElementById("table-content").innerHTML =
        `<div class="alert alert-error">${esc(err.message)}</div>`;
      document.getElementById("table-pagination").innerHTML = "";
    }
  }

  function resetSearch() {
    document.getElementById("table-search").value = "";
    currentPage = 1;
    loadTableData();
  }

  function renderTable(data, tableName) {
    if (!data.data || data.data.length === 0) {
      document.getElementById("table-content").innerHTML =
        `<div class="empty-state">No data found in ${tableName} table.</div>`;
      return;
    }

    let html = `
      <div style="margin-bottom: 12px; display: flex; flex-wrap: wrap; justify-content: space-between; gap: 8px;">
        <strong>${tableName.toUpperCase()}</strong>
        <span style="color: var(--text-secondary);">Showing ${data.data.length} of ${data.total_count} records (page ${data.page} of ${Math.ceil(data.total_count / data.limit)})</span>
      </div>
      <div style="overflow-x: auto;">
        <table class="data-table">
          <thead>
            <tr>`;

    data.columns.forEach(col => {
      html += `<th>${col.replace('_', ' ')}</th>`;
    });

    html += `
            </tr>
          </thead>
          <tbody>`;

    data.data.forEach(row => {
      html += `<tr>`;
      data.columns.forEach(col => {
        let value = row[col];
        if (value === null || value === undefined) value = '-';

        // Format numbers and dates
        if (typeof value === 'number' && (col.includes('price') || col.includes('amount') || col.includes('balance') || col.includes('earnings'))) {
          value = 'Rs.' + Number(value).toFixed(2);
        } else if (col.includes('date') && value !== '-') {
          value = new Date(value).toLocaleDateString();
        } else if (col === 'rating' && value !== 0) {
          value = `${value}/5 ⭐`;
        } else if (typeof value === 'string' && value.length > 50) {
          value = value.substring(0, 50) + '...';
        }

        html += `<td>${esc(String(value))}</td>`;
      });
      html += `</tr>`;
    });

    html += `
          </tbody>
        </table>
      </div>`;

    document.getElementById("table-content").innerHTML = html;
  }

  function renderPagination(data) {
    const pagination = document.getElementById("table-pagination");
    const totalPages = Math.max(1, Math.ceil((data.total_count || 0) / data.limit));
    const hasPrev = data.page > 1;
    const hasNext = data.page < totalPages;

    pagination.innerHTML = `
      <div style="display: flex; flex-wrap: wrap; gap: 10px; align-items: center;">
        <button class="btn btn-secondary" ${hasPrev ? `onclick="loadTableData(${data.page - 1})"` : "disabled"}>Previous</button>
        <span>Page ${data.page} of ${totalPages}</span>
        <button class="btn btn-secondary" ${hasNext ? `onclick="loadTableData(${data.page + 1})"` : "disabled"}>Next</button>
        <span style="color: var(--text-secondary);">Total records: ${data.total_count}</span>
      </div>
    `;
  }

  // Initialize
  refreshWallet();
  loadStats();
</script>

<style>
  .stat-card {
    background: var(--bg-secondary);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px;
    text-align: center;
  }
  .stat-card-primary {
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    color: white;
    border: none;
  }
  .stat-card-success {
    background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
    color: white;
    border: none;
  }
  .stat-card-info {
    background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%);
    color: white;
    border: none;
  }
  .stat-card-warning {
    background: linear-gradient(135deg, #fa709a 0%, #fee140 100%);
    color: white;
    border: none;
  }
  .stat-card-primary .stat-label,
  .stat-card-success .stat-label,
  .stat-card-info .stat-label,
  .stat-card-warning .stat-label {
    color: rgba(255, 255, 255, 0.9);
  }
  .stat-card-primary .stat-subtext,
  .stat-card-success .stat-subtext,
  .stat-card-info .stat-subtext,
  .stat-card-warning .stat-subtext {
    color: rgba(255, 255, 255, 0.7);
  }
  .stat-number {
    font-size: 2rem;
    font-weight: bold;
    color: var(--primary);
    margin-bottom: 4px;
  }
  .stat-card-primary .stat-number,
  .stat-card-success .stat-number,
  .stat-card-info .stat-number,
  .stat-card-warning .stat-number {
    color: white;
  }
  .stat-label {
    font-size: 0.875rem;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .stat-subtext {
    font-size: 0.75rem;
    margin-top: 4px;
    opacity: 0.8;
  }
  .data-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.875rem;
  }
  .data-table th {
    background: var(--bg-secondary);
    padding: 8px 12px;
    text-align: left;
    border-bottom: 2px solid var(--border);
    font-weight: 600;
  }
  .data-table td {
    padding: 8px 12px;
    border-bottom: 1px solid var(--border);
  }
  .data-table tr:hover {
    background: var(--bg-secondary);
  }
</style>

</body>
</html>
