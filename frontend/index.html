<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login | Campus Freelance Marketplace</title>
  <meta name="description" content="Log in to the Campus Freelance Marketplace to post jobs and find freelance work." />
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
<div class="auth-page">
  <div class="auth-card">
    <h1>Sign in</h1>
    <p class="auth-subtitle text-secondary text-sm">Campus Freelance Marketplace</p>

    <div id="alert-box"></div>

    <form id="login-form" novalidate>
      <div class="form-group">
        <label for="email">Email address</label>
        <input type="email" id="email" name="email" placeholder="you@example.com" autocomplete="email" />
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="Enter your password" autocomplete="current-password" />
      </div>
      <button type="submit" id="submit-btn" class="btn btn-primary btn-full">Sign in</button>
    </form>

    <div class="auth-footer">
      No account? <a href="/register.html">Create one</a>
    </div>
  </div>
</div>

<script src="/js/api.js"></script>
<script>
  redirectIfLoggedIn();

  const form = document.getElementById("login-form");
  const alertBox = document.getElementById("alert-box");
  const btn = document.getElementById("submit-btn");

  form.addEventListener("submit", async (e) => {
    e.preventDefault();
    clearAlert(alertBox);

    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value;

    if (!email || !password) {
      showAlert(alertBox, "Email and password are required.");
      return;
    }

    setLoading(btn, true);
    try {
      const data = await apiFetch("/auth/login", {
        method: "POST",
        body: JSON.stringify({ email, password }),
      });
      setAuth(data.token, { user_id: data.user_id, name: data.name, wallet_balance: data.wallet_balance, is_admin: data.is_admin });
      window.location.href = data.is_admin ? "/admin.html" : "/home.html";
    } catch (err) {
      showAlert(alertBox, err.message);
    } finally {
      setLoading(btn, false, "Sign in");
    }
  });
</script>
</body>
</html>
