<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register | Campus Freelance Marketplace</title>
  <meta name="description" content="Create your Campus Freelance Marketplace account to post jobs or offer your skills." />
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
<div class="auth-page">
  <div class="auth-card">
    <h1>Create account</h1>
    <p class="auth-subtitle text-secondary text-sm">Campus Freelance Marketplace</p>

    <div id="alert-box"></div>

    <form id="register-form" novalidate>
      <div class="form-group">
        <label for="name">Full name</label>
        <input type="text" id="name" name="name" placeholder="Your full name" autocomplete="name" />
      </div>
      <div class="form-group">
        <label for="email">Email address</label>
        <input type="email" id="email" name="email" placeholder="you@example.com" autocomplete="email" />
      </div>
      <div class="form-row">
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" placeholder="Min. 8 characters" autocomplete="new-password" />
        </div>
        <div class="form-group">
          <label for="confirm-password">Confirm password</label>
          <input type="password" id="confirm-password" name="confirm_password" placeholder="Repeat password" autocomplete="new-password" />
        </div>
      </div>
      <div class="form-group">
        <label for="contact">Contact number</label>
        <input type="tel" id="contact" name="contact" placeholder="10-digit mobile number" autocomplete="tel" maxlength="10" />
      </div>
      <button type="submit" id="submit-btn" class="btn btn-primary btn-full">Create account</button>
    </form>

    <div class="auth-footer">
      Already have an account? <a href="/index.html">Sign in</a>
    </div>
  </div>
</div>

<script src="/js/api.js"></script>
<script>
  redirectIfLoggedIn();

  const form = document.getElementById("register-form");
  const alertBox = document.getElementById("alert-box");
  const btn = document.getElementById("submit-btn");

  form.addEventListener("submit", async (e) => {
    e.preventDefault();
    clearAlert(alertBox);

    const name = document.getElementById("name").value.trim();
    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value;
    const confirm_password = document.getElementById("confirm-password").value;
    const contact = document.getElementById("contact").value.trim();

    // Client-side validation
    if (name.length < 3) { showAlert(alertBox, "Name must be at least 3 characters."); return; }
    if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) { showAlert(alertBox, "Enter a valid email address."); return; }
    if (password.length < 8) { showAlert(alertBox, "Password must be at least 8 characters."); return; }
    if (password !== confirm_password) { showAlert(alertBox, "Passwords do not match."); return; }
    if (!/^\d{10}$/.test(contact)) { showAlert(alertBox, "Enter a valid 10-digit contact number."); return; }

    setLoading(btn, true);
    try {
      const data = await apiFetch("/auth/register", {
        method: "POST",
        body: JSON.stringify({ name, email, password, confirm_password, contact }),
      });
      setAuth(data.token, { user_id: data.user_id, name: data.name, is_admin: data.is_admin });
      window.location.href = "/home.html";
    } catch (err) {
      showAlert(alertBox, err.message);
    } finally {
      setLoading(btn, false, "Create account");
    }
  });
</script>
</body>
</html>
